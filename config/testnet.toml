# Crown Bot TG — testnet profile.
#
# Ключи ровно по docs/bot-spec.md §9. Адреса программ и канистр этот
# репозиторий не порождает — только копирует из деплоев crown-factory,
# crown-games/subscription и crown-core. Секреты (BOT_TOKEN, путь к базе)
# живут только в env.

[chain]
id             = "solana-devnet"
rpc            = "https://api.devnet.solana.com"
factory_stream = "57MpCQ3TfAE66qDAnfkP9AX7LRqwd4CNX8uN6DaVwm3V"
usdc           = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
# Сплиттер нужен клиенту, чтобы собрать release-CPI; значение — из
# crown-core config. Прейскурант платформы (fee_bps, fee_wallet) — поля
# рождения каждого подписочного эскроу, часть соли; та же пара запечена в
# канистре-резолвере, эскроу с чужой ценой не получает подписей и не
# покупает допуск.
splitter       = "DDSeyx684iU9agHbXExwS3NstLvQeLKZcJWcJFSh1VDA"
fee_bps        = "300"
fee_wallet     = "3it64t7KXNip1C1BRYNh8ygeKyujWnaQrPSj3hV9TWbE"

[canisters]
# Локальная реплика: principal-ы зависят от деплоя и подставляются при
# запуске сервиса; здесь пусто до постоянного devnet-деплоя канистр.
subscription = ""
crown_index  = ""

[service]
# Страница мини-аппа (Telegram требует HTTPS в проде; локальная разработка —
# vite dev server). В прод-профиле — asset-канистра.
miniapp_url = "http://localhost:5173"

[policy]
challenge_ttl   = 300
rebind_cooldown = 259200
max_wallets     = 10
revision_period = 21600
grace           = 259200
renew_notice    = 604800
