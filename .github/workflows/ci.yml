name: ci

on: [push, pull_request]

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: ./scripts/lint-boundaries.sh
      - name: trusted repositories untouched
        run: '! git ls-files | grep -E "^(crown-core|crown-factory|crown-games)/"'
